services:

  # Deploiement hybride (VM): backend/frontend tires depuis un registry.
  # Sur la VM, seuls ce fichier + database/ sont necessaires.
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always

    environment:
      POSTGRES_DB: fuel_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234

    ports:
      - "5432:5432"

    # Donnees en RAM: base reconstruite a chaque recreation du conteneur.
    tmpfs:
      - /var/lib/postgresql/data:size=1g

    shm_size: 256mb

    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./database/data:/data:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s

  backend:
    image: aminetou01/backendcarb:1.0
    container_name: backend_api
    restart: always

    ports:
      - "5000:5000"

    environment:
      DB_HOST: db
      DB_NAME: fuel_db
      DB_USER: app_readonly
      DB_PASSWORD: 1234
      DB_PORT: 5432

  frontend:
    image: aminetou01/frontendcarb:1.0
    container_name: frontend_app
    restart: always

    ports:
      - "4200:80"

