services:

  # Données Postgres dans un tmpfs (RAM) : réinitialisées à chaque recréation du conteneur.
  # CSV + init.sql restent sur l’hôte (lecture seule pour /data). L’appli se connecte en app_readonly.
  db:
    image: postgres:15
    restart: always

    environment:
      POSTGRES_DB: fuel_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234

    ports:
      - "5432:5432"

    tmpfs:
      - /var/lib/postgresql/data:size=1g

    shm_size: 256mb

    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./database/data:/data:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s

  backend:
    build: ./backendCarb
    restart: always

    ports:
      - "5000:5000"

    depends_on:
      db:
        condition: service_healthy

    environment:
      DB_HOST: db
      DB_NAME: fuel_db
      DB_USER: app_readonly
      DB_PASSWORD: 1234
      DB_PORT: 5432

  frontend:
    build: ./frontendCarb
    restart: always

    ports:
      - "4200:4200"

    depends_on:
      - backend

    command: ["npx", "ng", "serve", "--host", "0.0.0.0", "--port", "4200", "--poll", "2000"]

    # Code source depuis l’hôte : plus besoin de rebuild à chaque edit (node_modules restent dans l’image).
    volumes:
      - ./frontendCarb/src:/app/src
      - ./frontendCarb/angular.json:/app/angular.json
      - ./frontendCarb/tsconfig.json:/app/tsconfig.json
      - ./frontendCarb/tsconfig.app.json:/app/tsconfig.app.json
